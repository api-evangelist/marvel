aid: marvel
name: Marvel
description: >-
  The Marvel Comics API is a tool for developers to access data from over 70
  years of Marvel comics, including characters, series, events, creators, and
  stories. The API requires authentication via an API key and is available
  through the Marvel Developer Portal.
